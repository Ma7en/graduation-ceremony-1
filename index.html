<!doctype html>
<html lang="ar">
    <head>
        <meta charset="UTF-8" />
        <title>تسجيل الحضور</title>
    </head>
    <body style="text-align: center; margin-top: 100px; font-family: Arial">
        <h2>🎉 تسجيل الحضور</h2>

        <input type="text" id="userId" placeholder="ادخل رقمك" />
        <br /><br />

        <button onclick="send()">تسجيل</button>

        <p id="result"></p>

        <!-- iframe مخفي -->
        <iframe id="hiddenFrame" style="display: none"></iframe>

        <script>
            const API_URL =
                "https://script.google.com/macros/s/AKfycbwVXuM-KJyJnDZiwv4iDBADRWRyyVMMNqLt5ZzSRsfZrdPa5R83lockDtPGYewX6fgf/exec";

            function send() {
                const id = document.getElementById("userId").value;

                if (!id) {
                    document.getElementById("result").innerText = "❗ ادخل رقم";
                    return;
                }

                const frame = document.getElementById("hiddenFrame");

                frame.onload = function () {
                    try {
                        const text = frame.contentDocument.body.innerText;

                        if (text.startsWith("success")) {
                            const name = text.split(":")[1];
                            document.getElementById("result").innerText =
                                `✅ مرحبًا ${name} 🎉`;
                        } else if (text === "exists") {
                            document.getElementById("result").innerText =
                                "⚠️ تم تسجيلك قبل كده";
                        } else {
                            document.getElementById("result").innerText =
                                "❌ الرقم غير موجود";
                        }
                    } catch (e) {
                        document.getElementById("result").innerText =
                            "❌ خطأ في القراءة";
                    }
                };

                frame.src = `${API_URL}?id=${id}`;
            }
        </script>
    </body>
</html>
